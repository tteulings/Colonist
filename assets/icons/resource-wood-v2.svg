<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Warm brown background -->
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="#8B6C4A" stroke="#6B5236" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle inner glow/texture -->
  <rect x="8" y="8" width="80" height="80" rx="17" ry="17" fill="none" stroke="#9E7E58" stroke-width="1.5" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Log 1 — bottom-left to top-right, slightly curved -->
  <path d="M22 68 C30 62, 58 38, 74 28" stroke="#F2DDB6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Log 1 bark texture -->
  <path d="M32 60 C34 58, 36 59, 38 57" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M48 48 C50 46, 53 47, 55 45" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 40 C62 38, 64 39, 67 37" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Log 1 end rings -->
  <ellipse cx="22" cy="68" rx="5" ry="6" fill="#E8CFA0" stroke="#C4A672" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="68" r="2" fill="#C4A672" opacity="0.6"/>

  <!-- Log 2 — top-left to bottom-right, crossing log 1 -->
  <path d="M24 30 C32 36, 60 60, 73 70" stroke="#F2DDB6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Log 2 bark texture -->
  <path d="M34 38 C36 40, 38 39, 40 41" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M50 52 C52 54, 55 53, 57 55" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M62 62 C64 64, 66 63, 68 65" stroke="#D4B98A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Log 2 end rings -->
  <ellipse cx="24" cy="30" rx="5" ry="6" fill="#E8CFA0" stroke="#C4A672" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="30" r="2" fill="#C4A672" opacity="0.6"/>
</svg>
