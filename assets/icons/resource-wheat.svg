<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Warm gold background -->
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="#C9A84C" stroke="#A68A38" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="80" height="80" rx="17" ry="17" fill="none" stroke="#DABE66" stroke-width="1.5" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stalk — flowing organic curve -->
  <path d="M48 80 C47 72, 49 60, 48 50 C47 42, 46 36, 48 28"
        stroke="#F5E6A8" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Grain kernels — paired leaves/grains along the stalk -->
  <!-- Bottom pair -->
  <path d="M48 58 C42 54, 34 52, 32 48" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M34 50 C36 46, 42 48, 44 52" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M48 56 C54 52, 62 50, 64 46" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M62 48 C60 44, 54 46, 52 50" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Middle pair -->
  <path d="M48 48 C42 44, 36 42, 34 38" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M36 40 C38 36, 44 38, 44 42" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M48 46 C54 42, 60 40, 62 36" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M60 38 C58 34, 52 36, 52 40" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top pair -->
  <path d="M48 38 C44 34, 40 32, 38 28" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M40 30 C42 26, 46 28, 46 32" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M48 36 C52 32, 56 30, 58 26" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M56 28 C54 24, 50 26, 50 30" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top tip -->
  <path d="M48 28 C47 22, 48 16, 48 14" stroke="#F5E6A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M46 20 C48 16, 50 16, 50 20" fill="#F2DFA0" stroke="#E8D088" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wispy awn at top -->
  <path d="M48 14 C46 10, 44 8, 42 10" stroke="#F5E6A8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M48 14 C50 10, 52 8, 54 10" stroke="#F5E6A8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
