<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Cool grey-blue background -->
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="#7D8A9E" stroke="#5E6B80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="80" height="80" rx="17" ry="17" fill="none" stroke="#92A0B4" stroke-width="1.5" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main mountain/rock shape — angular but with organic rounded strokes -->
  <path d="M16 72 C18 70, 28 50, 36 38 C40 32, 46 20, 48 18 C50 20, 56 32, 60 40 C64 48, 74 64, 80 72 C76 74, 20 74, 16 72Z"
        fill="#A8B4C4" stroke="#C8D0DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Faceted surface lines — angular crystalline detail -->
  <path d="M48 18 C46 28, 42 40, 38 52" stroke="#8A96A8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M48 18 C52 30, 56 44, 62 56" stroke="#8A96A8" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Cross facet lines -->
  <path d="M28 58 C34 52, 42 48, 48 46 C54 48, 62 54, 70 62"
        stroke="#8A96A8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M34 68 C38 62, 44 56, 48 54 C52 56, 58 62, 64 68"
        stroke="#8A96A8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Highlight facets — lighter patches for crystalline gleam -->
  <path d="M42 36 C44 32, 48 30, 48 36 C46 40, 42 40, 42 36Z"
        fill="#C8D4E2" opacity="0.4" stroke="none"/>
  <path d="M52 38 C54 34, 58 38, 56 42 C54 44, 50 42, 52 38Z"
        fill="#C8D4E2" opacity="0.3" stroke="none"/>

  <!-- Small sparkle/mineral detail -->
  <circle cx="40" cy="54" r="1.5" fill="#D8E0EA" opacity="0.6"/>
  <circle cx="58" cy="50" r="1.2" fill="#D8E0EA" opacity="0.5"/>
  <circle cx="50" cy="64" r="1.8" fill="#D8E0EA" opacity="0.4"/>

  <!-- Secondary smaller rock -->
  <path d="M68 72 C70 66, 76 58, 78 56 C80 58, 84 66, 84 72 C80 73, 70 73, 68 72Z"
        fill="#96A4B6" stroke="#C8D0DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M78 56 C77 62, 74 68, 72 72" stroke="#8A96A8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
