<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Soft sage green background -->
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="#7BA668" stroke="#5E8A4E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="80" height="80" rx="17" ry="17" fill="none" stroke="#8FBA7C" stroke-width="1.5" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Legs — simple sketchy strokes -->
  <path d="M34 66 C33 70, 34 75, 33 78" stroke="#D9C9A8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M42 67 C42 71, 43 75, 42 78" stroke="#D9C9A8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M56 67 C55 71, 56 75, 55 78" stroke="#D9C9A8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M64 66 C64 70, 63 75, 64 78" stroke="#D9C9A8" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Fluffy wool body — cloud-like organic shape -->
  <path d="M26 56 C22 50, 24 40, 30 36 C34 32, 38 30, 44 28 C50 26, 58 27, 64 30 C70 33, 74 38, 76 44 C78 50, 76 58, 72 62 C68 66, 58 68, 48 68 C38 68, 30 64, 26 56Z"
        fill="#F5F0E0" stroke="#E0D6C0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wool texture bumps -->
  <path d="M32 40 C30 36, 36 33, 38 36" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M44 32 C43 28, 50 27, 50 31" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M60 33 C60 29, 67 30, 66 34" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M40 44 C38 40, 44 39, 44 43" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M54 40 C53 36, 60 37, 58 41" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M48 52 C46 48, 52 48, 52 52" stroke="#E0D6C0" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Head -->
  <path d="M20 50 C16 44, 18 36, 24 34 C28 32, 32 36, 30 40 C28 44, 22 48, 24 52 C26 54, 28 52, 26 56"
        fill="#D9C9A8" stroke="#BBA888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye -->
  <circle cx="22" cy="40" r="2" fill="#4A4A3A"/>

  <!-- Ear -->
  <path d="M18 36 C14 34, 14 30, 18 32" stroke="#BBA888" stroke-width="2" stroke-linecap="round" fill="#D9C9A8"/>
</svg>
