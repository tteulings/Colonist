<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Sage green background -->
  <circle cx="60" cy="60" r="56" fill="#C4D8B8"/>
  <circle cx="60" cy="60" r="54" fill="#C4D8B8" stroke="#A4BF96" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Face -->
  <circle cx="60" cy="58" r="22" fill="#FDDCC4" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wispy hair strokes on top -->
  <path d="M50 38C54 32 58 30 60 30" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M58 36C62 30 66 29 70 32" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M44 42C47 36 52 33 55 32" stroke="#2E5438" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Round glasses -->
  <circle cx="52" cy="55" r="8" fill="none" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="68" cy="55" r="8" fill="none" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bridge -->
  <path d="M60 55C59 53 61 53 60 55" stroke="#2E5438" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="53" x2="60" y2="55" stroke="#2E5438" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes behind glasses -->
  <circle cx="52" cy="55" r="2.2" fill="#1E3E28"/>
  <circle cx="68" cy="55" r="2.2" fill="#1E3E28"/>

  <!-- Gentle knowing smile -->
  <path d="M53 66C56 69 64 69 67 66" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Rosy cheeks -->
  <circle cx="42" cy="62" r="3.5" fill="#E8A090" opacity="0.4"/>
  <circle cx="78" cy="62" r="3.5" fill="#E8A090" opacity="0.4"/>

  <!-- Simple body/shoulders -->
  <path d="M32 100C38 84 48 78 60 78C72 78 82 84 88 100" stroke="#2E5438" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#8AAE78"/>
</svg>
