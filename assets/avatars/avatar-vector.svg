<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Warm purple/mauve background -->
  <circle cx="60" cy="60" r="56" fill="#D4C0E0"/>
  <circle cx="60" cy="60" r="54" fill="#D4C0E0" stroke="#BEA6D0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Face -->
  <circle cx="60" cy="58" r="22" fill="#FDDCC4" stroke="#4A2E66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pointy wizard/party hat -->
  <path d="M44 40L60 14L76 40" stroke="#4A2E66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#9A78B8"/>
  <!-- Little star on hat -->
  <circle cx="60" cy="26" r="2.5" fill="#E8D4B8" stroke="#4A2E66" stroke-width="1.5"/>

  <!-- Open eye -->
  <circle cx="52" cy="55" r="2.5" fill="#2E1848"/>

  <!-- Winking eye (closed) -->
  <path d="M64 55C66 53 70 53 72 55" stroke="#4A2E66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Playful grin -->
  <path d="M50 65C54 71 66 71 70 65" stroke="#4A2E66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cheeky tongue or extra grin detail -->
  <path d="M57 68C59 70 61 70 63 68" stroke="#4A2E66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="#E8A090"/>

  <!-- Rosy cheeks -->
  <circle cx="44" cy="61" r="3.5" fill="#E8A090" opacity="0.45"/>
  <circle cx="76" cy="61" r="3.5" fill="#E8A090" opacity="0.45"/>

  <!-- Simple body/shoulders -->
  <path d="M32 100C38 84 48 78 60 78C72 78 82 84 88 100" stroke="#4A2E66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#A88CC0"/>
</svg>
