  <circle cx="60" cy="60" r="54" fill="#B8CCE0" stroke="#96AECB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Face -->
  <circle cx="60" cy="58" r="22" fill="#FDDCC4" stroke="#2E4A66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Explorer hat -->
  <path d="M40 42L60 24L80 42" stroke="#2E4A66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#5A7A9A"/>
  <path d="M36 44H84" stroke="#2E4A66" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 44L44 42" stroke="#2E4A66" stroke-width="2" stroke-linecap="round"/>
  <path d="M78 44L76 42" stroke="#2E4A66" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes - one raised eyebrow for curious look -->
  <circle cx="52" cy="55" r="2.5" fill="#1E3448"/>
  <circle cx="68" cy="55" r="2.5" fill="#1E3448"/>

  <!-- Raised eyebrow (curious!) -->
  <path d="M48 49C50 46 54 46 57 48" stroke="#2E4A66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Normal eyebrow -->
  <path d="M63 49C65 47 69 47 72 49" stroke="#2E4A66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Slight open-mouth smile (curious/excited) -->
