  <circle cx="76" cy="61" r="3.5" fill="#E8A090" opacity="0.45"/>

  <!-- Simple body/shoulders -->
  <path d="M32 100C38 84 48 78 60 78C72 78 82 84 88 100" stroke="#2E4A66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#7A9AB8"/>
