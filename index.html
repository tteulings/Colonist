<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colonist-Style Full Game</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="table-header">
        <div id="leftPlayerPanel" class="mini-player"></div>
        <div class="table-logo">
          <img src="./assets/icons/ui-logo.svg" alt="" />
          <span>Colonist Table</span>
        </div>
        <div id="rightPlayerPanel" class="mini-player"></div>
      </section>

      <main class="table-layout">
        <section class="board-area">
          <section class="board-panel">
            <canvas id="board" width="980" height="560" aria-label="Game board"></canvas>
            <div class="map-build-hud" aria-label="Build from map">
              <button id="quickBuildRoadBtn" class="hud-build-btn" title="Build Road (1)">
                <span class="build-glyph road"></span>
                Road
              </button>
              <button id="quickBuildSettlementBtn" class="hud-build-btn" title="Build Settlement (2)">
                <span class="build-glyph settlement"></span>
                Settlement
              </button>
              <button id="quickBuildCityBtn" class="hud-build-btn" title="Build City (3)">
                <span class="build-glyph city"></span>
                City
              </button>
            </div>
            <div id="toastStack" class="toast-stack" aria-live="polite"></div>
          </section>
        </section>

        <aside class="right-rail">
          <section class="rail-card">
            <h2>Turn Status</h2>
            <div id="statusText" class="status"></div>
            <div id="hintText" class="hint"></div>
            <div class="hotkeys" aria-label="Keyboard shortcuts">
              Shortcuts: R · E · 1/2/3 · B · A · Esc
            </div>
          </section>

          <section class="rail-card">
            <h2>Players</h2>
            <div id="scoreboard"></div>
          </section>

          <section class="rail-card">
            <h2>Event Log</h2>
            <div id="log" class="log"></div>
          </section>
        </aside>
      </main>

      <section class="bottom-bar">
        <section class="action-strip compact-main-strip">
          <h2>Action Strip</h2>
          <div class="tile-row">
            <button id="rollDiceBtn" class="action-tile btn-roll" title="R">
              <img class="btn-icon" src="./assets/icons/ui-dice.svg" alt="" />
              <span class="tile-label">Roll</span>
              <span class="tile-shortcut">R</span>
            </button>
            <button id="endTurnBtn" class="action-tile btn-neutral" title="E">
              <img class="btn-icon" src="./assets/icons/ui-end-turn.svg" alt="" />
              <span class="tile-label">End</span>
              <span class="tile-shortcut">E</span>
            </button>
            <button id="buildRoadBtn" class="action-tile btn-build" title="1">
              <span class="build-glyph road"></span>
              <span class="tile-label">Road</span>
              <span class="tile-shortcut">1</span>
            </button>
            <button id="buildSettlementBtn" class="action-tile btn-build" title="2">
              <span class="build-glyph settlement"></span>
              <span class="tile-label">Settle</span>
              <span class="tile-shortcut">2</span>
            </button>
            <button id="buildCityBtn" class="action-tile btn-build" title="3">
              <span class="build-glyph city"></span>
              <span class="tile-label">City</span>
              <span class="tile-shortcut">3</span>
            </button>
            <button id="buyDevBtn" class="action-tile btn-dev" title="B">
              <img class="btn-icon" src="./assets/icons/dev-knight.svg" alt="" />
              <span class="tile-label">Dev</span>
              <span class="tile-shortcut">B</span>
            </button>
            <button id="tradeBankBtn" class="action-tile btn-trade" title="Trade with bank">
              <img class="btn-icon" src="./assets/icons/ui-trade.svg" alt="" />
              <span class="tile-label">Trade</span>
            </button>
          </div>
          <div id="currentActionText" class="current-action-copy"></div>
          <div class="phase-track" aria-label="Turn flow">
            <span id="phaseRollTag" class="phase-tag">1 Roll</span>
            <span id="phaseBuildTag" class="phase-tag">2 Build / Trade</span>
            <span id="phaseEndTag" class="phase-tag">3 End Turn</span>
          </div>
        </section>

        <details class="action-strip compact-drawer">
          <summary>Automation / Reset</summary>
          <div class="collapsible-body">
            <div class="button-row">
              <button id="nextTurnBtn" class="btn-build"><img class="btn-icon" src="./assets/icons/ui-bot-turns.svg" alt="" />Play AI Turns</button>
              <button id="autoplayBtn" class="btn-neutral">Start Autoplay</button>
              <button id="resetBtn" class="btn-neutral"><img class="btn-icon" src="./assets/icons/ui-reset.svg" alt="" />Reset Game</button>
              <button id="resetViewBtn" class="btn-neutral">Reset View</button>
            </div>
            <label for="speedRange">Autoplay Speed</label>
            <input id="speedRange" type="range" min="150" max="2000" step="50" value="700" />
          </div>
        </details>

        <details class="action-strip compact-drawer">
          <summary>Development Cards</summary>
          <div class="collapsible-body">
            <div class="button-row">
              <button id="playKnightBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-knight.svg" alt="" />Knight</button>
              <button id="playRoadBuildingBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-road-building.svg" alt="" />Road Building</button>
              <button id="playYearOfPlentyBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-year-of-plenty.svg" alt="" />Year of Plenty</button>
              <button id="playMonopolyBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-monopoly.svg" alt="" />Monopoly</button>
            </div>
          </div>
        </details>

        <details class="action-strip compact-drawer">
          <summary>Bank Trade</summary>
          <div class="collapsible-body">
            <div class="trade-row">
              <label for="giveResourceSelect">Give</label>
              <select id="giveResourceSelect"></select>
            </div>
            <div class="trade-row">
              <label for="getResourceSelect">Get</label>
              <select id="getResourceSelect"></select>
            </div>
          </div>
        </details>
      </section>
    </div>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
