<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <title>Colonist</title>
    <link rel="stylesheet" href="./styles.css?v=22" />
  </head>
  <body>
    <div class="app-shell">
      <section class="table-header">
        <div id="leftPlayerPanel" class="mini-player-simple"></div>
        <div class="table-logo">
          <img src="./assets/icons/ui-logo.svg" alt="" />
          <span>Colonist Table</span>
        </div>
        <div id="rightPlayerPanel" class="mini-player-simple"></div>
      </section>

      <div class="bank-strip" id="bankStrip" aria-label="Bank stock"></div>

      <!-- Settings gear — top-left floating -->
      <details class="settings-drawer-float" id="settingsDrawer">
        <summary class="settings-float-trigger" aria-label="Settings">&#9881;<span class="version-label">v0.22</span></summary>
        <div class="settings-float-body">
          <div class="button-row">
            <button id="nextTurnBtn" class="btn-build"><img class="btn-icon" src="./assets/icons/ui-bot-turns.svg" alt="" />Play AI Turns</button>
            <button id="autoplayBtn" class="btn-neutral">Start Autoplay</button>
            <button id="resetBtn" class="btn-neutral"><img class="btn-icon" src="./assets/icons/ui-reset.svg" alt="" />Reset</button>
            <button id="resetViewBtn" class="btn-neutral">Reset View</button>
          </div>
          <label for="speedRange">Autoplay Speed</label>
          <input id="speedRange" type="range" min="150" max="2000" step="50" value="700" />
          <div class="button-row">
            <button id="playKnightBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-knight.svg" alt="" />Knight</button>
            <button id="playRoadBuildingBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-road-building.svg" alt="" />Road Building</button>
            <button id="playYearOfPlentyBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-year-of-plenty.svg" alt="" />Year of Plenty</button>
            <button id="playMonopolyBtn" class="btn-dev"><img class="btn-icon" src="./assets/icons/dev-monopoly.svg" alt="" />Monopoly</button>
          </div>
        </div>
      </details>

      <main class="table-layout">
        <section class="board-area">
          <section class="board-panel">
            <canvas id="board" width="1200" height="700" aria-label="Game board"></canvas>
            <div id="toastStack" class="toast-stack" aria-live="polite"></div>
            <div id="lastDiceDisplay" class="last-dice-display" style="display:none"></div>
            <div id="costReference" class="cost-reference">
              <div class="cost-ref-header">Build Costs</div>
              <div class="cost-ref-items" id="costRefItems"></div>
            </div>
            <div id="supplyOverview" class="supply-overview"></div>
          </section>
        </section>

        <aside class="right-rail">
          <section class="rail-card rail-log" id="railLog">
            <h2>Event Log</h2>
            <div id="log" class="log"></div>
          </section>
          <section class="rail-card rail-players">
            <h2>Players</h2>
            <div id="scoreboard"></div>
          </section>
        </aside>

        <button class="log-toggle" id="logToggle" title="Toggle event log">&#9776;</button>
      </main>

      <div class="hand-strip" id="handStrip" aria-label="Your cards"></div>

      <!-- Discard selection overlay (when 7 is rolled) -->
      <div id="discardPanel" class="discard-panel" style="display:none">
        <div class="discard-panel-header">Discard cards</div>
        <div class="discard-panel-info" id="discardInfo"></div>
        <div class="discard-panel-cards" id="discardCards"></div>
        <div class="discard-panel-selected" id="discardSelected"></div>
        <button id="discardConfirmBtn" class="btn-roll discard-confirm-btn" disabled>Confirm</button>
      </div>

      <!-- Robber victim selection overlay -->
      <div id="victimPanel" class="victim-panel" style="display:none">
        <div class="victim-panel-header">Steal from:</div>
        <div id="victimOptions" class="victim-options"></div>
      </div>

      <!-- Trade modal overlay -->
      <div id="tradeModal" class="trade-modal" style="display:none">
        <div class="trade-modal-inner">
          <div class="trade-modal-header">
            <span>Trade</span>
            <button id="tradeModalClose" class="trade-modal-close">&times;</button>
          </div>

          <!-- Resource selector rows — shared for bank & player -->
          <div class="trade-section-label"><span class="trade-label-icon">&#x1F4E4;</span> You give:</div>
          <div id="tradeOfferGrid" class="trade-resource-grid"></div>
          <div class="trade-arrow"><div class="trade-arrow-icon">&#8645;</div></div>
          <div class="trade-section-label"><span class="trade-label-icon">&#x1F4E5;</span> You get:</div>
          <div id="tradeRequestGrid" class="trade-resource-grid"></div>

          <div id="tradeProposalResult" class="trade-proposal-result"></div>

          <div class="trade-modal-actions">
            <button id="tradeExecuteBtn" class="btn-trade trade-action-btn">Bank Trade</button>
            <button id="tradeProposalBtn" class="btn-build trade-action-btn">Propose to Players</button>
          </div>

          <!-- Hidden selects for bank trade (used by JS) -->
          <select id="giveResourceSelect" style="display:none"></select>
          <select id="getResourceSelect" style="display:none"></select>
        </div>
      </div>

      <!-- Incoming trade offer popup -->
      <div id="incomingTradePanel" class="incoming-trade-panel" style="display:none">
        <div class="incoming-trade-header" id="incomingTradeHeader">Trade offer</div>
        <div class="incoming-trade-body" id="incomingTradeBody"></div>
        <div class="incoming-trade-actions">
          <button id="acceptTradeBtn" class="btn-build">Accept</button>
          <button id="rejectTradeBtn" class="btn-neutral">Reject</button>
        </div>
      </div>

      <section class="bottom-bar">
        <div class="resource-card-strip" id="resourceCardStrip" aria-label="Your resources">
          <!-- Populated by game.js -->
        </div>
        <div class="action-prompt-row">
          <div class="action-prompt-status">
            <img class="action-prompt-avatar" id="actionPromptAvatar" src="./assets/avatars/avatar-human.svg" alt="" />
            <span class="action-prompt-text" id="actionPromptText">Roll dice</span>
          </div>
          <button id="rollDiceBtn" class="action-btn btn-roll" title="R">Roll</button>
          <button id="endTurnBtn" class="action-btn btn-neutral" title="E" style="display:none">End Turn</button>
          <div class="action-prompt-build" id="actionPromptBuild" style="display:none">
            <button id="buildRoadBtn" class="action-btn btn-build" title="1"><span class="build-glyph road"></span> Road</button>
            <button id="buildSettlementBtn" class="action-btn btn-build" title="2"><span class="build-glyph settlement"></span> Settle</button>
            <button id="buildCityBtn" class="action-btn btn-build" title="3"><span class="build-glyph city"></span> City</button>
            <button id="buyDevBtn" class="action-btn btn-dev" title="B">Dev</button>
          </div>
          <button id="tradeBankBtn" class="action-btn btn-trade" title="T" style="display:none">Trade</button>
        </div>
      </section>
    </div>

    <script type="module" src="./src/game.js?v=22"></script>
  </body>
</html>
